databaseChangeLog:
  - changeSet:
      id: 007
      author: oskarott
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: parent_id
                  type: BIGINT
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: categories
            baseColumnNames: parent_id
            constraintName: fk_categories_parent
            referencedTableName: categories
            referencedColumnNames: id
            onDelete: SET NULL
