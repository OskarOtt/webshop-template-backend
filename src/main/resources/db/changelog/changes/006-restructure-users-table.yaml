databaseChangeLog:
  - changeSet:
      id: 006
      author: oskarott
      changes:
        - dropColumn:
            tableName: users
            columnName: username
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: first_name
                  type: VARCHAR(255)
              - column:
                  name: last_name
                  type: VARCHAR(255)
              - column:
                  name: phone
                  type: VARCHAR(50)
