databaseChangeLog:
  - changeSet:
      id: 011
      author: oskarott
      changes:
        - createTable:
            tableName: article_images
            columns:
              - column:
                  name: article_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: image_url
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: INT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: article_images
            baseColumnNames: article_id
            constraintName: fk_article_images_article
            referencedTableName: articles
            referencedColumnNames: id
            onDelete: CASCADE
        - dropColumn:
            tableName: articles
            columnName: image_url
