databaseChangeLog:
  - changeSet:
      id: 008
      author: oskarott
      changes:
        - createTable:
            tableName: brands
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: logo_url
                  type: VARCHAR(500)
              - column:
                  name: description
                  type: TEXT
