spring.datasource.url=jdbc:h2:file:./data/webshopdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=false

# Brevo SMTP credentials injected via environment variables
BREVO_SMTP_USER=${BREVO_SMTP_USER}
BREVO_SMTP_KEY=${BREVO_SMTP_KEY}
MAIL_FROM=${MAIL_FROM}
