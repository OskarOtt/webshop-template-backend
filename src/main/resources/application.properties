spring.application.name=webshop-template-backend
spring.profiles.active=local

spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=604800000

stripe.api-key=${STRIPE_API_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
stripe.success-url=${FRONTEND_URL}/webshop-template-frontend/checkout/success
stripe.cancel-url=${FRONTEND_URL}/webshop-template-frontend/checkout/cancel

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_USER}
spring.mail.password=${BREVO_SMTP_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=${MAIL_FROM:noreply@example.com}

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.password-reset.expiration-minutes=30

# Seed data admin credentials set via environment variables in production
seed.admin.email=${SEED_ADMIN_EMAIL}
seed.admin.password=${SEED_ADMIN_PASSWORD}